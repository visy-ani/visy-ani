name: Generate Terminal Style Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate Terminal Style GitHub Stats
        # Requires a GitHub PAT (repo + read:user scopes) stored as GH_TOKEN secret
        uses: yogeshwaran01/github-stats-terminal-style@v1.0.2
        with:
          github-login: visy-ani
          github-token: ${{ secrets.GH_TOKEN }}

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add github_stats.svg
          if ! git diff --staged --quiet; then
            git commit -m "docs: update terminal style GitHub stats"
            git push
          else
            echo "No changes to commit."
          fi
